<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=11">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-row">
      <div class="brand">
        <svg class="logo-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="4" fill="#ff385c"/>
          <rect x="6" y="9" width="12" height="2" rx="1" fill="#ffffff"/>
          <rect x="6" y="13" width="8" height="2" rx="1" fill="#ffffff"/>
        </svg>
        <h1>뉴스 대시보드</h1>
      </div>
      <form id="add-keyword-form" class="add-keyword-form">
        <input type="text" id="new-keyword-input" placeholder="새 키워드 추가 (예: 인공지능)" maxlength="50" required>
        <button type="submit" class="btn btn-icon" title="키워드 추가" aria-label="키워드 추가">+</button>
      </form>
      <div class="status-row">
        <span id="last-update" class="last-update">확인 중...</span>
        <button id="update-btn" class="btn btn-icon" title="업데이트" aria-label="업데이트">⟳</button>
        <button id="settings-btn" class="btn btn-icon" title="연결 설정" aria-label="설정">⚙</button>
      </div>
      <div class="view-toggle" role="group" aria-label="보기 범위">
        <button class="scope-btn active" data-scope="today">오늘</button>
        <button class="scope-btn" data-scope="all">전체</button>
      </div>
    </div>
  </div>
</header>

<section id="settings-panel" class="panel" hidden>
  <h2>연결 설정</h2>
  <p class="hint">
    "업데이트"/"키워드 추가"/"키워드 삭제"는 모두 Cloudflare Worker가 대신 처리합니다.
    이 브라우저에는 GitHub 토큰을 전혀 저장하지 않고, 아래 두 값만 있으면 됩니다.
    새 브라우저에서 처음 열었다면 이 두 값만 다시 입력하면 됩니다(둘 다 이 브라우저의 localStorage에만 저장됨).
  </p>
  <label class="field">
    Worker URL
    <input type="text" id="worker-url-input" placeholder="https://naver-news-search.xxxx.workers.dev">
  </label>
  <label class="field">
    앱 시크릿 (X-App-Secret)
    <input type="password" id="app-secret-input" placeholder="Worker의 APP_SHARED_SECRET과 동일한 값(기억하기 쉬운 값으로 정해도 됨)">
  </label>
  <div class="field-row">
    <label class="field">
      Owner (자동 감지 실패 시에만 입력)
      <input type="text" id="owner-input" placeholder="예: myusername">
    </label>
    <label class="field">
      Repo (자동 감지 실패 시에만 입력)
      <input type="text" id="repo-input" placeholder="예: naver-news-dashboard">
    </label>
  </div>

  <div class="btn-row">
    <button id="pat-save-btn" class="btn btn-primary">저장</button>
    <button id="pat-clear-btn" class="btn btn-ghost">전체 삭제</button>
  </div>
</section>

<main id="feed" class="feed">
  <p class="empty-hint">불러오는 중...</p>
</main>

<div id="toast" class="toast" hidden></div>

<script src="app.js?v=11"></script>
</body>
</html>
